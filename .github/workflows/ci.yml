name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend / Java 21
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: iman_ci
          POSTGRES_USER: iman_ci
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iman_ci -d iman_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_URL: jdbc:postgresql://localhost:5432/iman_ci
      DB_USERNAME: iman_ci
      DB_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-secret-not-used-outside-this-ephemeral-run-32-bytes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Verify backend
        run: mvn --batch-mode --no-transfer-progress verify

  frontend:
    name: Frontend / Node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm run test --if-present
      - name: Build
        run: npm run build

  docker:
    name: Validate deployment images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate Compose model
        env:
          POSTGRES_DB: iman_validation
          POSTGRES_USER: iman_validation
          POSTGRES_PASSWORD: ephemeral-validation-password
          JWT_SECRET: ephemeral-validation-secret-at-least-32-bytes-long
          CORS_ORIGINS: https://validation.invalid
        run: docker compose -f deployment/compose.production.yml config --quiet
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/backend.Dockerfile
          push: false
          tags: iman/backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/frontend.Dockerfile
          push: false
          tags: iman/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
