name: iman-investment

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data
    security_opt:
      - no-new-privileges:true

  backend:
    image: ${BACKEND_IMAGE:-iman-investment-backend:local}
    build:
      context: ..
      dockerfile: deployment/backend.Dockerfile
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER:?set POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      UPLOAD_PATH: /app/uploads
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app
      - data
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true

  web:
    image: ${FRONTEND_IMAGE:-iman-investment-frontend:local}
    build:
      context: ..
      dockerfile: deployment/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    environment:
      API_UPSTREAM: backend:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_BIND_ADDRESS:-127.0.0.1}:${HTTP_PORT:-8080}:8080"
    networks:
      - app
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d:size=1m
      - /var/cache/nginx:size=32m
      - /var/run:size=1m
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  uploads:

networks:
  app:
    internal: false
  data:
    internal: true
