        metaTitle: { type: [string, 'null'], maxLength: 200 }
        metaDescription: { type: [string, 'null'], maxLength: 500 }
        status: { $ref: '#/components/schemas/ContentStatus' }
        publishedAt: { type: [string, 'null'], format: date-time }
    CmsPage:
      allOf:
        - { $ref: '#/components/schemas/AuditFields' }
        - { $ref: '#/components/schemas/CmsPageWrite' }
    JobWrite:
      type: object
