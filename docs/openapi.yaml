        name: { type: string, minLength: 1, maxLength: 200 }
        industry: { type: string, minLength: 1, maxLength: 100 }
        description: { type: [string, 'null'], maxLength: 10000 }
        imageAssetId: { type: [string, 'null'], format: uuid }
