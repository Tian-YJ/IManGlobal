openapi: 3.1.0
info:
  title: IMan Investment Platform API
  version: 1.0.0
  summary: Canonical production contract for the public website and administration portal.
  description: |
    JSON field names are camelCase. IDs are UUIDs and timestamps are RFC 3339 UTC instants.
    Public reads expose only published content. `/admin/**` requires a JWT plus the permission
    stated by each operation. A SUPER_ADMIN bypasses individual permission checks.
servers:
  - url: /api
    description: Same-origin deployment
tags:
  - { name: Auth }
  - { name: Public content }
  - { name: Business plan submission }
  - { name: Careers }
  - { name: Dashboard }
  - { name: Business plans }
  - { name: Applicants }
  - { name: Portfolio administration }
  - { name: Job administration }
  - { name: CMS }
  - { name: Media }
  - { name: Access control }
  - { name: Operations }
security: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CurrentUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /public/portfolio:
    get:
      tags: [Public content]
      operationId: listPublishedPortfolio
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/Search' }
        - { name: industry, in: query, schema: { type: string, maxLength: 100 } }
        - { name: featured, in: query, schema: { type: boolean } }
        - { name: sort, in: query, schema: { type: string, default: 'displayOrder,asc', pattern: '^(displayOrder|name|createdAt),(asc|desc)$' } }
      responses:
        '200':
          description: Published companies
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioCompanyPage' }
  /public/insights:
    get:
      tags: [Public content]
      operationId: listPublishedInsights
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/Search' }
        - { name: sort, in: query, schema: { type: string, default: 'publishedAt,desc', pattern: '^(publishedAt|title),(asc|desc)$' } }
      responses:
        '200':
          description: Published insights
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsightPage' }
  /public/insights/{slug}:
    get:
      tags: [Public content]
      operationId: getPublishedInsight
      parameters: [{ $ref: '#/components/parameters/Slug' }]
      responses:
        '200':
          description: Published insight
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Insight' }
        '404': { $ref: '#/components/responses/NotFound' }
  /public/team:
    get:
      tags: [Public content]
      operationId: listPublishedTeam
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
      responses:
        '200':
          description: Published team profiles
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMemberPage' }
  /public/pages/{slug}:
    get:
      tags: [Public content]
      operationId: getPublishedPage
      description: Canonical replacement for `GET /public/legal/{slug}`; use slugs such as `privacy-policy` and `terms-of-use`.
      parameters: [{ $ref: '#/components/parameters/Slug' }]
      responses:
        '200':
          description: Published page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CmsPage' }
        '404': { $ref: '#/components/responses/NotFound' }
  /public/contact:
    post:
      tags: [Public content]
      operationId: createContactMessage
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactMessageCreate' }
      responses:
        '201':
          description: Message accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionReceipt' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /public/jobs:
    get:
      tags: [Careers]
      operationId: listPublishedJobs
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/Search' }
        - { name: department, in: query, schema: { type: string, maxLength: 100 } }
        - { name: location, in: query, schema: { type: string, maxLength: 100 } }
        - { name: type, in: query, schema: { $ref: '#/components/schemas/JobType' } }
        - { name: sort, in: query, schema: { type: string, default: 'publishedAt,desc', pattern: '^(publishedAt|title|department),(asc|desc)$' } }
      responses:
        '200':
          description: Published jobs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobPage' }
  /public/jobs/{slug}:
    get:
      tags: [Careers]
      operationId: getPublishedJob
      parameters: [{ $ref: '#/components/parameters/Slug' }]
      responses:
        '200':
          description: Published job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '404': { $ref: '#/components/responses/NotFound' }
  /public/jobs/{jobId}/applications:
    post:
      tags: [Careers]
      operationId: applyForJob
      parameters: [{ $ref: '#/components/parameters/JobId' }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [application, resume]
              properties:
                application: { $ref: '#/components/schemas/JobApplicationCreate' }
                resume: { type: string, format: binary, description: 'PDF, DOC, or DOCX; maximum 10 MiB.' }
                coverLetter: { type: string, format: binary, description: 'Optional PDF, DOC, or DOCX; maximum 10 MiB.' }
            encoding:
              application: { contentType: application/json }
      responses:
        '201':
          description: Application received
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionReceipt' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /public/business-plans:
    post:
      tags: [Business plan submission]
      operationId: createBusinessPlan
      description: Creates a server-side draft or atomically creates and submits it. The returned draft token is shown only once.
      parameters:
        - { name: submit, in: query, schema: { type: boolean, default: false } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [plan]
              properties:
                plan: { $ref: '#/components/schemas/BusinessPlanWrite' }
                documents:
                  type: array
                  maxItems: 10
                  items: { type: string, format: binary }
            encoding:
              plan: { contentType: application/json }
      responses:
        '201':
          description: Draft created or submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPlanDraftAccess' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /public/business-plans/{planId}:
    get:
      tags: [Business plan submission]
      operationId: getOwnBusinessPlanDraft
      parameters:
        - { $ref: '#/components/parameters/PlanId' }
        - { $ref: '#/components/parameters/DraftToken' }
      responses:
        '200':
          description: Draft
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPlan' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Business plan submission]
      operationId: autosaveBusinessPlanDraft
      description: Idempotent autosave of supplied fields. Only DRAFT plans are mutable.
      parameters:
        - { $ref: '#/components/parameters/PlanId' }
        - { $ref: '#/components/parameters/DraftToken' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/BusinessPlanPatch' }
      responses:
        '200':
          description: Saved draft
          headers:
            ETag: { schema: { type: string }, description: New entity version. }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPlan' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /public/business-plans/{planId}/documents:
    post:
      tags: [Business plan submission]
      operationId: uploadBusinessPlanDocuments
      parameters:
        - { $ref: '#/components/parameters/PlanId' }
        - { $ref: '#/components/parameters/DraftToken' }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [documents]
              properties:
                documents:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items: { type: string, format: binary }
      responses:
        '201':
          description: Uploaded documents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FileAsset' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
  /public/business-plans/{planId}/submit:
    post:
      tags: [Business plan submission]
      operationId: submitBusinessPlanDraft
      parameters:
        - { $ref: '#/components/parameters/PlanId' }
        - { $ref: '#/components/parameters/DraftToken' }
        - { $ref: '#/components/parameters/IfMatch' }
      responses:
        '200':
          description: Submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionReceipt' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /admin/dashboard:
    get:
      tags: [Dashboard]
      operationId: getDashboard
      description: 'RBAC: dashboard.view'
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Dashboard aggregates
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Dashboard' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /admin/business-plans:
    get:
      tags: [Business plans]
      operationId: listBusinessPlans
      description: 'RBAC: business_plans.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/Search' }
        - { $ref: '#/components/parameters/AdminSort' }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/BusinessPlanStatus' } }
        - { name: assignedToId, in: query, schema: { type: string, format: uuid } }
        - { name: submittedFrom, in: query, schema: { type: string, format: date-time } }
        - { name: submittedTo, in: query, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: Matching plans
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPlanPage' }
  /admin/business-plans/{planId}:
    get:
      tags: [Business plans]
      operationId: getBusinessPlan
      description: 'RBAC: business_plans.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/PlanId' }]
      responses:
        '200':
          description: Plan detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPlan' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Business plans]
      operationId: archiveBusinessPlan
      description: 'RBAC: business_plans.manage. Soft-archives the record and retains audit/history.'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/PlanId' }]
      responses:
        '204': { description: Archived }
  /admin/business-plans/{planId}/status:
    patch:
      tags: [Business plans]
      operationId: transitionBusinessPlan
      description: 'RBAC: business_plans.manage. Server validates the workflow transition.'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/PlanId' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StatusTransitionRequest' }
      responses:
        '200':
          description: Updated plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPlan' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/business-plans/{planId}/assignment:
    patch:
      tags: [Business plans]
      operationId: assignBusinessPlan
      description: 'RBAC: business_plans.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/PlanId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: [string, 'null'], format: uuid, description: Null unassigns. }
      responses:
        '200':
          description: Updated plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPlan' }
  /admin/business-plans/{planId}/notes:
    post:
      tags: [Business plans]
      operationId: addBusinessPlanNote
      description: 'RBAC: business_plans.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/PlanId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteCreate' }
      responses:
        '201':
          description: Created note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }
  /admin/business-plans/{planId}/history:
    get:
      tags: [Business plans]
      operationId: getBusinessPlanHistory
      description: 'RBAC: business_plans.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/PlanId' }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
      responses:
        '200':
          description: Immutable workflow history
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowEventPage' }
  /admin/business-plans/{planId}/documents/{documentId}:
    get:
      tags: [Business plans]
      operationId: downloadBusinessPlanDocument
      description: 'RBAC: business_plans.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/PlanId' }
        - { name: documentId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
  /admin/applicants:
    get:
      tags: [Applicants]
      operationId: listApplicants
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/Search' }
        - { $ref: '#/components/parameters/AdminSort' }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ApplicantStatus' } }
        - { name: jobId, in: query, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Matching applicants
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicantPage' }
  /admin/applicants/{applicantId}:
    get:
      tags: [Applicants]
      operationId: getApplicant
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/ApplicantId' }]
      responses:
        '200':
          description: Applicant detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Applicant' }
        '404': { $ref: '#/components/responses/NotFound' }
  /admin/applicants/{applicantId}/status:
    patch:
      tags: [Applicants]
      operationId: transitionApplicant
      description: 'RBAC: applicants.manage. Interview and offer transitions require their corresponding record.'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/ApplicantId' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApplicantTransitionRequest' }
      responses:
        '200':
          description: Updated applicant
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Applicant' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/applicants/{applicantId}/notes:
    post:
      tags: [Applicants]
      operationId: addApplicantNote
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/ApplicantId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteCreate' }
      responses:
        '201':
          description: Created note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }
  /admin/applicants/{applicantId}/history:
    get:
      tags: [Applicants]
      operationId: getApplicantHistory
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/ApplicantId' }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
      responses:
        '200':
          description: Applicant events
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowEventPage' }
  /admin/applicants/{applicantId}/interviews:
    get:
      tags: [Applicants]
      operationId: listApplicantInterviews
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/ApplicantId' }]
      responses:
        '200':
          description: Scheduled and completed interviews
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Interview' }
    post:
      tags: [Applicants]
      operationId: scheduleApplicantInterview
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/ApplicantId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InterviewWrite' }
      responses:
        '201':
          description: Scheduled interview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Interview' }
  /admin/applicants/{applicantId}/interviews/{interviewId}:
    put:
      tags: [Applicants]
      operationId: updateApplicantInterview
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/ApplicantId' }
        - { name: interviewId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InterviewWrite' }
      responses:
        '200':
          description: Updated interview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Interview' }
    delete:
      tags: [Applicants]
      operationId: cancelApplicantInterview
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/ApplicantId' }
        - { name: interviewId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Cancelled }
  /admin/applicants/{applicantId}/offer:
    put:
      tags: [Applicants]
      operationId: upsertApplicantOffer
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/ApplicantId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OfferWrite' }
      responses:
        '200':
          description: Offer created or updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
    delete:
      tags: [Applicants]
      operationId: withdrawApplicantOffer
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/ApplicantId' }]
      responses:
        '204': { description: Offer withdrawn }
  /admin/applicants/{applicantId}/{fileKind}:
    get:
      tags: [Applicants]
      operationId: downloadApplicantFile
      description: 'RBAC: applicants.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/ApplicantId' }
        - { name: fileKind, in: path, required: true, schema: { type: string, enum: [resume, cover-letter] } }
      responses:
        '200':
          description: Applicant file
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
  /admin/portfolio:
    get:
      tags: [Portfolio administration]
      operationId: listAdminPortfolio
      description: 'RBAC: portfolio.manage'
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/Search' }
        - { $ref: '#/components/parameters/AdminSort' }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ContentStatus' } }
      responses:
        '200':
          description: Portfolio records
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioCompanyPage' }
    post:
      tags: [Portfolio administration]
      operationId: createPortfolioCompany
      description: 'RBAC: portfolio.manage'
      security: [{ bearerAuth: [] }]
      requestBody: { $ref: '#/components/requestBodies/PortfolioWrite' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioCompany' }
  /admin/portfolio/{id}:
    get:
      tags: [Portfolio administration]
      operationId: getPortfolioCompany
      description: 'RBAC: portfolio.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Portfolio company
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioCompany' }
    put:
      tags: [Portfolio administration]
      operationId: updatePortfolioCompany
      description: 'RBAC: portfolio.manage'
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody: { $ref: '#/components/requestBodies/PortfolioWrite' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioCompany' }
    delete:
      tags: [Portfolio administration]
      operationId: deletePortfolioCompany
      description: 'RBAC: portfolio.manage'
      security: [{ bearerAuth: [] }]
