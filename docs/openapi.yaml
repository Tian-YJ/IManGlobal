components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived access JWT issued by `/auth/login`.
  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    PlanId: { name: planId, in: path, required: true, schema: { type: string, format: uuid } }
    JobId: { name: jobId, in: path, required: true, schema: { type: string, format: uuid } }
    ApplicantId: { name: applicantId, in: path, required: true, schema: { type: string, format: uuid } }
    Slug: { name: slug, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 200, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' } }
    Page: { name: page, in: query, description: Zero-based page index., schema: { type: integer, minimum: 0, default: 0 } }
    Size: { name: size, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    Search: { name: search, in: query, schema: { type: string, maxLength: 200 } }
    AdminSort: { name: sort, in: query, description: 'Single allow-listed field and direction.', schema: { type: string, default: 'createdAt,desc', pattern: '^[A-Za-z][A-Za-z0-9]*,(asc|desc)$' } }
    DraftToken: { name: X-Draft-Token, in: header, required: true, schema: { type: string, minLength: 32 }, description: Opaque secret returned once when the draft is created; never place it in a URL. }
    IfMatch: { name: If-Match, in: header, required: true, schema: { type: string }, description: ETag from the most recent representation; prevents lost updates. }
  requestBodies:
    PortfolioWrite: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PortfolioCompanyWrite' } } } }
    JobWrite: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/JobWrite' } } } }
    CmsPageWrite: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CmsPageWrite' } } } }
    InsightWrite: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/InsightWrite' } } } }
    TeamWrite: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/TeamMemberWrite' } } } }
    UserWrite: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UserWrite' } } } }
    RoleWrite: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RoleWrite' } } } }
    PermissionWrite: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PermissionWrite' } } } }
  responses:
    Unauthorized: { description: 'Missing, invalid, or expired credentials.', content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } } }
    Forbidden: { description: Authenticated but not authorized., content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } } }
    NotFound: { description: Resource not found., content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } } }
    Conflict: { description: State or uniqueness conflict., content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } } }
    PreconditionFailed: { description: ETag is stale., content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } } }
    PayloadTooLarge: { description: Upload exceeds an endpoint or aggregate limit., content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } } }
    UnsupportedMediaType: { description: File type is not allowed., content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } } }
    ValidationError: { description: Request validation failed., content: { application/problem+json: { schema: { $ref: '#/components/schemas/ValidationProblem' } } } }
    RateLimited:
      description: Too many requests.
      headers: { Retry-After: { schema: { type: integer }, description: Seconds until retry. } }
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
  schemas:
    Problem:
      type: object
      required: [type, title, status, detail, instance, requestId]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
