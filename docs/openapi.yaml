        metaDescription: { type: [string, 'null'], maxLength: 500 }
    Insight:
      allOf:
        - { $ref: '#/components/schemas/AuditFields' }
        - { $ref: '#/components/schemas/InsightWrite' }
        - type: object
          properties:
            imageUrl: { type: [string, 'null'], format: uri-reference, readOnly: true }
    TeamMemberWrite:
      type: object
      additionalProperties: false
      required: [fullName, roleTitle, status]
      properties:
        fullName: { type: string, minLength: 1, maxLength: 200 }
        roleTitle: { type: string, minLength: 1, maxLength: 100 }
        bio: { type: [string, 'null'], maxLength: 10000 }
        imageAssetId: { type: [string, 'null'], format: uuid }
        linkedinUrl: { type: [string, 'null'], format: uri, maxLength: 500 }
        displayOrder: { type: integer, minimum: 0, default: 0 }
        status: { $ref: '#/components/schemas/ContentStatus' }
    TeamMember:
      allOf:
        - { $ref: '#/components/schemas/AuditFields' }
        - { $ref: '#/components/schemas/TeamMemberWrite' }
        - type: object
          properties:
            imageUrl: { type: [string, 'null'], format: uri-reference, readOnly: true }
    CmsPageWrite:
      type: object
      additionalProperties: false
      required: [title, slug, content, status]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
