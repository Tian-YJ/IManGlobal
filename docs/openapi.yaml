        category: { type: [string, 'null'], maxLength: 100 }
        excerpt: { type: [string, 'null'], maxLength: 1000 }
        content: { type: string, minLength: 1, maxLength: 1000000 }
        imageAssetId: { type: [string, 'null'], format: uuid }
